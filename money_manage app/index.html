<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Money Manager Pro</title>
<style>
:root{
  --bg1:#667eea;--bg2:#764ba2;--card:rgba(255,255,255,0.15);--text:#222;--white:#fff;
}
body.dark{
  --bg1:#0f2027;--bg2:#203a43;--card:rgba(0,0,0,0.35);--text:#f1f1f1;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2));min-height:100vh;color:var(--text);transition:0.3s;}
.container{max-width:1100px;margin:auto;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:#fff;}
.header h2{font-size:28px;}
.toggle{background:#222;border-radius:20px;padding:6px 12px;font-size:14px;}
button{padding:10px 16px;border:none;border-radius:8px;background:#4CAF50;color:#fff;font-weight:600;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.05);opacity:0.9;}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px;}
.card{padding:20px;border-radius:15px;color:#fff;text-align:center;font-size:18px;font-weight:bold;backdrop-filter:blur(10px);background:var(--card);border:1px solid rgba(255,255,255,0.2);box-shadow:0 8px 20px rgba(0,0,0,0.3);}
table{width:100%;border-collapse:collapse;background:var(--card);backdrop-filter:blur(10px);border-radius:12px;overflow:hidden;color:var(--text);}
th{background:rgba(0,0,0,0.5);color:#fff;padding:12px;}
td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.2);}
tr:hover{background:rgba(255,255,255,0.1);}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);}
.modal-content{background:var(--card);backdrop-filter:blur(15px);padding:25px;margin:5% auto;width:350px;border-radius:15px;color:var(--text);border:1px solid rgba(255,255,255,0.2);}
input,select{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;background:rgba(255,255,255,0.2);color:var(--text);}
input::placeholder{color:#ddd;}
.error{color:#ff6b6b;font-size:12px;}
@media(max-width:600px){.header{flex-direction:column;gap:10px;}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h2>💰 Money Manager Pro</h2>
<div>
<button class="toggle" onclick="app.toggleDark()">🌙 Toggle</button>
<button onclick="app.openModal()">+ Add</button>
</div>
</div>

<div class="summary">
<div class="card">Income ₹<span id="income">0</span></div>
<div class="card">Expense ₹<span id="expense">0</span></div>
<div class="card">Balance ₹<span id="balance">0</span></div>
</div>

<table>
<thead>
<tr><th>Date</th><th>Category</th><th>Sub</th><th>Desc</th><th>Amount</th><th>Actions</th></tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Add Transaction</h3>
<input type="number" id="amount" placeholder="Amount">
<div class="error" id="amountErr"></div>
<input type="date" id="date">
<select id="category">
<option value="">Category</option>
<option value="Income">Income</option>
<option value="Expense">Expense</option>
</select>
<select id="sub"><option value="">Sub Category</option></select>
<input type="text" id="desc" maxlength="100" placeholder="Description">
<button onclick="app.save()">Save</button>
<button onclick="app.closeModal()">Cancel</button>
</div>
</div>

<script>
class Transaction{
constructor(id,amount,date,category,sub,desc){this.id=id;this.amount=amount;this.date=date;this.category=category;this.sub=sub;this.desc=desc;}}

class App{
constructor(){this.transactions=JSON.parse(localStorage.getItem('data'))||[];this.editId=null;this.init();}
init(){this.render();this.updateSummary();this.setToday();}
setToday(){document.getElementById('date').value=new Date().toISOString().split('T')[0];}
openModal(){modal.style.display='block';}
closeModal(){modal.style.display='none';}
toggleDark(){document.body.classList.toggle('dark');}
validate(){let amt=amount.value; if(!amt||amt<=0){amountErr.innerText='Invalid amount';return false;} amountErr.innerText='';return true;}
save(){if(!this.validate())return;let t=new Transaction(this.editId||Date.now(),amount.value,date.value,category.value,sub.value,desc.value);
if(this.editId){this.transactions=this.transactions.map(x=>x.id===this.editId?t:x);this.editId=null;} else this.transactions.push(t);
localStorage.setItem('data',JSON.stringify(this.transactions));this.render();this.updateSummary();this.closeModal();}
render(){list.innerHTML='';this.transactions.forEach(t=>{list.innerHTML+=`<tr>
<td>${t.date}</td><td>${t.category}</td><td>${t.sub}</td><td>${t.desc}</td><td>${t.amount}</td>
<td><button onclick="app.edit(${t.id})">Edit</button><button onclick="app.delete(${t.id})">Del  

</button></td></tr>`});}
updateSummary(){let i=0,e=0;this.transactions.forEach(t=>t.category==='Income'?i+=+t.amount:e+=+t.amount);
income.innerText=i;expense.innerText=e;balance.innerText=i-e;}
edit(id){let t=this.transactions.find(x=>x.id===id);this.editId=id;amount.value=t.amount;date.value=t.date;category.value=t.category;sub.value=t.sub;desc.value=t.desc;this.openModal();}
delete(id){if(confirm('Delete?')){this.transactions=this.transactions.filter(x=>x.id!==id);localStorage.setItem('data',JSON.stringify(this.transactions));this.render();this.updateSummary();}}
}
const app=new App();
</script>
</body>
</html>
